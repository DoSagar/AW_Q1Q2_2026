:root{
  --navy:#003058;--blue:#005DAA;--blue-mid:#4D8CC4;--blue-light:#A0C2E0;
  --near-black:#292929;--gray-dark:#4D4D4D;--gray:#969696;--gray-light:#E6E6E6;
  --white:#FFFFFF;--bad:#C0392B;--font:'Raleway',Arial,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--white);color:var(--near-black);font-family:var(--font);height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden;}

/* HEADER */
header{padding:.9rem 1rem .35rem;text-align:center;flex-shrink:0;width:100%;border-bottom:1px solid var(--gray-light);}
.logo-lockup{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.2rem;}
.logo-text{font-size:.62rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);}

.pointer{position:absolute;top:-5px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:36px solid var(--navy);filter:drop-shadow(0 2px 6px rgba(0,48,88,.25));transition:filter .2s;}

/* BOTTOM BAR */
.bottom-bar{flex-shrink:0;display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem 1.1rem;border-top:1px solid var(--gray-light);width:100%;justify-content:center;}
@keyframes pulse-glow{0%,100%{box-shadow:0 4px 14px rgba(0,93,170,.35);}50%{box-shadow:0 4px 28px rgba(0,93,170,.7),0 0 0 4px rgba(0,93,170,.12);}}
.spin-btn{padding:.75rem 3rem;background:var(--blue);color:var(--white);font-family:var(--font);font-size:.88rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:none;border-radius:2px;cursor:pointer;min-width:140px;transition:background .15s,transform .1s;box-shadow:0 4px 14px rgba(0,93,170,.35);}
.spin-btn.spinning{animation:pulse-glow 1.5s ease-in-out infinite;}
.spin-btn:hover:not(:disabled){background:var(--navy);transform:translateY(-1px);}
.spin-btn:active:not(:disabled){transform:translateY(0);}
.spin-btn:disabled{background:var(--gray-light);color:var(--gray);cursor:not-allowed;transform:none;animation:none;box-shadow:none;}
.edit-btn{padding:.75rem 1rem;background:transparent;border:1px solid var(--gray-light);color:var(--gray-dark);border-radius:2px;cursor:pointer;font-family:var(--font);font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:.4rem;white-space:nowrap;transition:border-color .15s,color .15s;}
.edit-btn:hover{border-color:var(--blue);color:var(--blue);}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(380px,95vw);background:var(--white);border-left:1px solid var(--gray-light);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(0,48,88,.1);}
.drawer.open{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.25rem .9rem;border-bottom:1px solid var(--gray-light);flex-shrink:0;}
.drawer-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--navy);}
.drawer-close{width:28px;height:28px;background:transparent;border:none;color:var(--gray);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:color .15s,background .15s;}

.drawer-body{flex:1;overflow-y:auto;padding:.9rem 1.25rem;display:flex;flex-direction:column;gap:.4rem;}

.shame-row{display:flex;align-items:center;gap:.55rem;border:1px solid var(--gray-light);border-radius:2px;padding:.45rem .5rem .45rem .6rem;transition:border-color .15s;}

.color-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

.photo-ring:hover{border-color:var(--blue);}
.photo-ring.has-photo{border-style:solid;border-color:var(--blue-mid);}

.photo-ring .ph-plus{font-size:.9rem;color:var(--blue-mid);user-select:none;}
.photo-ring .ph-hint{position:absolute;inset:0;background:rgba(0,48,88,.65);display:flex;align-items:center;justify-content:center;font-size:.42rem;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.9);opacity:0;transition:opacity .15s;border-radius:50%;}
.photo-ring.has-photo:hover .ph-hint{opacity:1;}
.row-input{flex:1;background:transparent;border:none;color:var(--near-black);font-family:var(--font);font-size:.88rem;outline:none;min-width:0;}

.done-btn{width:100%;padding:.62rem;background:var(--blue);color:var(--white);border:none;border-radius:2px;cursor:pointer;font-family:var(--font);font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:background .15s;}
.done-btn:hover{background:var(--navy);}

/* WINNER OVERLAY — frameless */
.winner-overlay{position:fixed;inset:0;background:rgba(0,28,58,0.87);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;z-index:200;opacity:0;pointer-events:none;transition:opacity .35s;}
.winner-overlay.show{opacity:1;pointer-events:all;}

@keyframes ring-expand{0%{transform:scale(1);opacity:.7;}100%{transform:scale(2.6);opacity:0;}}
.pulse-ring{position:absolute;inset:-4px;border-radius:50%;border:3px solid rgba(160,194,224,.5);animation:ring-expand 2s ease-out infinite;}

.winner-avatar-big{width:clamp(130px,22vw,190px);height:clamp(130px,22vw,190px);border-radius:50%;border:4px solid rgba(255,255,255,.9);overflow:hidden;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:3.5rem;box-shadow:0 0 50px rgba(77,140,196,.5),0 20px 60px rgba(0,0,0,.5);}

.winner-name-big{font-size:clamp(2rem,5.5vw,3.2rem);font-weight:700;color:var(--white);text-align:center;padding:0 1.5rem;text-shadow:0 2px 24px rgba(0,0,0,.5);opacity:0;transform:translateY(18px);transition:opacity .45s ease .4s,transform .45s ease .4s;text-wrap:balance;line-height:1.1;}
.winner-overlay.show .winner-name-big{opacity:1;transform:translateY(0);}
@keyframes float-btn{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.winner-spin-again{padding:.65rem 2.2rem;background:transparent;border:2px solid rgba(255,255,255,.35);color:rgba(255,255,255,.8);border-radius:100px;cursor:pointer;font-family:var(--font);font-size:.8rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:0;transform:translateY(16px);transition:opacity .4s ease .6s,transform .4s ease .6s,border-color .2s,color .2s;animation:none;}
.winner-overlay.show .winner-spin-again{opacity:1;transform:translateY(0);animation:float-btn 3s ease-in-out infinite 1s;}
.winner-spin-again:hover{border-color:rgba(255,255,255,.85);color:var(--white);}

/* Flash overlay */
#flash{position:fixed;inset:0;background:var(--white);z-index:300;opacity:0;pointer-events:none;}
@keyframes flash-out{0%{opacity:.55;}100%{opacity:0;}}

/* CROP MODAL */
.crop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;}
.crop-overlay.open{opacity:1;pointer-events:all;}
.crop-card{background:var(--white);border-radius:3px;padding:1.4rem;width:min(400px,96vw);display:flex;flex-direction:column;gap:.9rem;box-shadow:0 24px 64px rgba(0,0,0,.45);}
.crop-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--navy);}
.crop-hint{font-size:.72rem;color:var(--gray);margin-top:-.3rem;}
.crop-wrap{position:relative;width:100%;aspect-ratio:1;background:#111;border-radius:3px;overflow:hidden;cursor:grab;touch-action:none;user-select:none;}
.crop-wrap:active{cursor:grabbing;}
#cropCanvas{width:100%;height:100%;display:block;}
.zoom-row{display:flex;align-items:center;gap:.8rem;}

#zoomSlider{flex:1;height:4px;accent-color:var(--blue);cursor:pointer;}
.crop-actions{display:flex;gap:.5rem;justify-content:flex-end;}
.crop-cancel{padding:.52rem 1.2rem;background:transparent;border:1px solid var(--gray-light);color:var(--gray-dark);border-radius:2px;cursor:pointer;font-family:var(--font);font-size:.8rem;font-weight:600;transition:border-color .15s;}
.crop-cancel:hover{border-color:var(--navy);color:var(--navy);}
.crop-confirm{padding:.52rem 1.5rem;background:var(--blue);color:var(--white);border:none;border-radius:2px;cursor:pointer;font-family:var(--font);font-size:.8rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:background .15s;}
.crop-confirm:hover{background:var(--navy);}
</style>

<div id="flash"></div>
<canvas id="confetti-canvas"></canvas>

<header>
  <div class="logo-lockup">
    <span class="logo-text">OPX Partners</span>
    <div class="logo-div"></div>
    <span class="logo-text">Q1–Q2 2026</span>
  </div>
  <h1>The <em>Shame List</em></h1>
</header>

<nav class="tabs">
  <button class="tab-btn active" id="tab-shame" onclick="switchTab('shame')">Shame List</button>
  <button class="tab-btn" id="tab-reroll" onclick="switchTab('reroll')">Re-roll</button>
</nav>

<div class="main">
  <div class="wheel-container">
    <div class="pointer" id="pointer"></div>
    <canvas id="wheel"></canvas>
  </div>
</div>

<div class="bottom-bar">
  <button class="spin-btn" id="spinBtn" onclick="handleSpin()">Spin</button>
  <button class="edit-btn" id="editBtn" onclick="openDrawer()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span id="editBtnLabel">Contestants</span>
  </button>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <div class="drawer-header">
    <span class="drawer-title" id="drawerTitle">Contestants</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</aside>

<!-- Crop modal -->
<div class="crop-overlay" id="cropOverlay">
  <div class="crop-card">
    <p class="crop-title">Crop Photo</p>
    <p class="crop-hint">Drag to reposition · Scroll or pinch to zoom</p>

      <canvas id="cropCanvas"></canvas>
    </div>

    </div>

    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>

<script>
const PALETTE=['#003058','#005DAA','#4D8CC4','#A0C2E0','#C0392B','#4D4D4D','#1A5C8F','#2A6FA8','#3D5A80','#6B7FA8','#264F78','#5B7FAA'];

const state={
  shame:{rotation:0,slices:Array.from({length:6},(_,i)=>({name:'',img:null,imgSrc:null,color:PALETTE[i]}))},
  reroll:{rotation:0,items:Array.from({length:6},(_,i)=>({name:'',weight:1,forced:false,color:PALETTE[i]}))}
};

let activeTab='shame';
let spinPhase='idle';
let spinVelocity=0;
let pendingWinnerIdx=-1;
let stopStartRot=0,stopTargetRot=0,stopDuration=0,stopStartTime=0;
let animFrame=null;

const canvas=document.getElementById('wheel');
const ctx=canvas.getContext('2d');

function sizeCanvas(){
  const main=document.querySelector('.main');
  const r=main.getBoundingClientRect();
  const size=Math.floor(Math.min(r.width,r.height)*.93);
  canvas.width=size;canvas.height=size;
  canvas.style.width=size+'px';canvas.style.height=size+'px';
  drawWheel();
}
window.addEventListener('resize',sizeCanvas);

function drawWheel(highlightIdx){
  const data=activeTab==='shame'?state.shame.slices:state.reroll.items;
  const rot=activeTab==='shame'?state.shame.rotation:state.reroll.rotation;
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=Math.min(cx,cy)-14;
  const n=data.length;
  if(!n||!W)return;
  const step=(2*Math.PI)/n;
  ctx.clearRect(0,0,W,H);

  data.forEach((d,i)=>{
    const a0=rot-Math.PI/2+i*step,a1=a0+step,mid=a0+step/2;
    ctx.save();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a0,a1);ctx.closePath();ctx.clip();
    ctx.fillStyle=d.color;ctx.fillRect(0,0,W,H);
    if(i===highlightIdx){ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillRect(0,0,W,H);}
    const sh=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    sh.addColorStop(0,'rgba(255,255,255,0.1)');sh.addColorStop(.5,'rgba(255,255,255,0.02)');sh.addColorStop(1,'rgba(0,0,0,0.13)');
    ctx.fillStyle=sh;ctx.fillRect(0,0,W,H);
    if(activeTab==='shame'&&d.img){
      const dist=r*.58,pr=Math.min(r*.17,r*step*.34);
      const px=cx+dist*Math.cos(mid),py=cy+dist*Math.sin(mid);
      ctx.save();ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.clip();
      // apply stored crop — sc/ox/oy come from the crop modal (CR=180 circle in CS=400 canvas)
      const sc=d.cropScale||1,ox=d.cropX||0,oy=d.cropY||0;
      const sw=(180*2)/sc,sh=sw; // source size in original image pixels (CR=180)
      const sx=d.img.width/2-sw/2-ox/sc,sy=d.img.height/2-sh/2-oy/sc;
      ctx.drawImage(d.img,sx,sy,sw,sh,px-pr,py-pr,pr*2,pr*2);ctx.restore();
      ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=2;ctx.stroke();
    }
    ctx.restore();
    ctx.save();ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a0),cy+r*Math.sin(a0));
    ctx.strokeStyle='rgba(255,255,255,0.28)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
    const raw=d.name||(activeTab==='shame'?'#'+(i+1):'Item '+(i+1));
    const lbl=raw.length>14?raw.slice(0,14)+'…':raw;
    const labelDist=(activeTab==='shame'&&d.img)?r*.86:r*.7;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(mid);ctx.textAlign='right';
    const fs=Math.max(10,Math.min(16,r/(n<5?9:n<9?11:14)));
    ctx.font='600 '+fs+'px Raleway,Arial,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.96)';ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowBlur=5;
    ctx.fillText(lbl,labelDist,fs*.36);ctx.restore();
  });

  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(0,48,88,0.14)';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r+8,0,Math.PI*2);ctx.strokeStyle='rgba(0,48,88,0.07)';ctx.lineWidth=10;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);ctx.fillStyle='#FFFFFF';ctx.fill();
  ctx.strokeStyle='rgba(0,48,88,0.15)';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,12,0,Math.PI*2);ctx.fillStyle='#003058';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle='#005DAA';ctx.fill();
}

function switchTab(tab){
  if(spinPhase!=='idle')return;
  activeTab=tab;
  document.getElementById('tab-shame').classList.toggle('active',tab==='shame');
  document.getElementById('tab-reroll').classList.toggle('active',tab==='reroll');
  document.getElementById('editBtnLabel').textContent=tab==='shame'?'Contestants':'Items';
  drawWheel();
}

function handleSpin(){
  if(spinPhase==='idle')startSpin();
  else if(spinPhase==='cruising')triggerStop();
}

function startSpin(){
  spinPhase='cruising';spinVelocity=0;
  const btn=document.getElementById('spinBtn');
  btn.textContent='Stop';btn.classList.add('spinning');
  canvas.classList.remove('celebrating');
  cancelAnimationFrame(animFrame);
  (function loop(){
    if(spinPhase!=='cruising')return;
    spinVelocity=Math.min(spinVelocity+.0025,.065);
    if(activeTab==='shame')state.shame.rotation+=spinVelocity;
    else state.reroll.rotation+=spinVelocity;
    drawWheel();
    animFrame=requestAnimationFrame(loop);
  })();
}

function triggerStop(){
  const data=activeTab==='shame'?state.shame.slices:state.reroll.items;
  pendingWinnerIdx=pickWinner(data);
  const currentRot=activeTab==='shame'?state.shame.rotation:state.reroll.rotation;
  const n=data.length,step=(2*Math.PI)/n;
  const midAngle=(pendingWinnerIdx+.5)*step;
  const decelDist=spinVelocity/.0008;
  let target=-midAngle;
  while(target<currentRot+decelDist+2*Math.PI)target+=2*Math.PI;
  stopStartRot=currentRot;stopTargetRot=target;
  stopDuration=Math.max(2800,(target-currentRot)/spinVelocity*16*.55);
  stopStartTime=performance.now();
  spinPhase='stopping';
  const btn=document.getElementById('spinBtn');
  btn.textContent='…';btn.disabled=true;btn.classList.remove('spinning');
  cancelAnimationFrame(animFrame);
  (function stopLoop(now){
    if(spinPhase!=='stopping')return;
    const t=Math.min((now-stopStartTime)/stopDuration,1);
    const eased=1-Math.pow(1-t,3);
    const rot=stopStartRot+(stopTargetRot-stopStartRot)*eased;
    if(activeTab==='shame')state.shame.rotation=rot;
    else state.reroll.rotation=rot;
    drawWheel();
    if(t<1){animFrame=requestAnimationFrame(stopLoop);}
    else{
      if(activeTab==='shame')state.shame.rotation=stopTargetRot;
      else state.reroll.rotation=stopTargetRot;
      spinPhase='idle';
      const b=document.getElementById('spinBtn');
      b.textContent='Spin';b.disabled=false;b.classList.remove('spinning');
      celebrateStop(pendingWinnerIdx);
    }
  })(performance.now());
}

function celebrateStop(idx){
  // Flash the winning slice white a few times
  canvas.classList.add('celebrating');
  document.getElementById('pointer').style.filter='drop-shadow(0 2px 12px rgba(77,140,196,.9))';
  let flashes=0;
  const flashInterval=setInterval(()=>{
    drawWheel(flashes%2===0?idx:undefined);
    flashes++;
    if(flashes>=6){
      clearInterval(flashInterval);
      drawWheel(idx);
      // Screen flash then show winner
      const flash=document.getElementById('flash');
      flash.style.animation='none';flash.offsetHeight;
      flash.style.animation='flash-out .5s ease-out forwards';
      setTimeout(()=>{
        canvas.classList.remove('celebrating');
        document.getElementById('pointer').style.filter='';
        showWinner(idx);
      },350);
    }
  },80);
}

function pickWinner(data){
  if(activeTab==='reroll'){
    const fi=data.findIndex(d=>d.forced);
    if(fi>=0)return fi;
    const total=data.reduce((s,d)=>s+(d.weight||1),0);
    let r=Math.random()*total;
    for(let i=0;i<data.length;i++){r-=(data[i].weight||1);if(r<=0)return i;}
    return data.length-1;
  }
  return Math.floor(Math.random()*data.length);
}

function showWinner(idx){
  const data=activeTab==='shame'?state.shame.slices:state.reroll.items;
  const w=data[idx];
  document.getElementById('winnerEyebrow').textContent=activeTab==='shame'?'On the shame list':'Re-roll result';
  document.getElementById('winnerName').textContent=w.name||(activeTab==='shame'?'Contestant '+(idx+1):'Item '+(idx+1));
  const av=document.getElementById('winnerAvatar');
  if(activeTab==='shame'&&w.imgSrc){av.innerHTML='<img src="'+w.imgSrc+'" alt="">';}
  else{av.innerHTML=activeTab==='shame'?'😬':'🎯';}
  document.getElementById('winnerOverlay').classList.add('show');
  launchConfetti(w.color);
}

function closeWinner(){
  document.getElementById('winnerOverlay').classList.remove('show');
  stopConfetti();
}

// ── Drawer ──────────────────────────────────────────────
function openDrawer(){
  document.getElementById('drawerTitle').textContent=activeTab==='shame'?'Contestants':'Items & Weights';
  renderDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}
function renderDrawer(){if(activeTab==='shame')renderShameDrawer();else renderRerollDrawer();}

function renderShameDrawer(){
  const body=document.getElementById('drawerBody'),foot=document.getElementById('drawerFooter');
  body.innerHTML='';
  state.shame.slices.forEach((s,i)=>{
    const row=document.createElement('div');row.className='shame-row';
    row.innerHTML=
      '<span class="color-dot" style="background:'+s.color+'"></span>'+
      '<div class="photo-ring'+(s.imgSrc?' has-photo':'')+'" onclick="uploadPhoto('+i+')">'+
        (s.imgSrc?'<img src="'+s.imgSrc+'" alt=""><span class="ph-hint">Recrop</span>':'<span class="ph-plus">+</span>')+
      '</div>'+
      '<input class="row-input" type="text" placeholder="Name…" value="'+esc(s.name)+'" maxlength="20" oninput="state.shame.slices['+i+'].name=this.value;drawWheel()">'+
      (state.shame.slices.length>2?'<button class="row-rm" onclick="removeShame('+i+')">✕</button>':'');
    body.appendChild(row);
  });
  foot.innerHTML='<button class="add-row-btn"'+(state.shame.slices.length>=16?' disabled':'')+' onclick="addShame()">+ Add contestant</button><button class="done-btn" onclick="closeDrawer()">Done</button>';
}
function renderRerollDrawer(){
  const body=document.getElementById('drawerBody'),foot=document.getElementById('drawerFooter');
  body.innerHTML='';
  state.reroll.items.forEach((it,i)=>{
    const row=document.createElement('div');row.className='reroll-row'+(it.forced?' forced':'');
    row.innerHTML=
      '<span class="color-dot" style="background:'+it.color+'"></span>'+
      '<input class="row-input" type="text" placeholder="Item…" value="'+esc(it.name)+'" maxlength="24" oninput="state.reroll.items['+i+'].name=this.value;drawWheel()">'+
      '<span class="weight-label">Bias</span>'+
      '<input class="weight-input" type="number" min="1" max="20" value="'+it.weight+'" oninput="state.reroll.items['+i+'].weight=Math.max(1,+this.value)||1">'+
      '<button class="force-btn'+(it.forced?' active':'')+'" onclick="toggleForce('+i+')">Force</button>'+
      (state.reroll.items.length>2?'<button class="row-rm" onclick="removeReroll('+i+')">✕</button>':'');
    body.appendChild(row);
  });
  foot.innerHTML='<div class="drawer-hint"><strong>Bias</strong> sets relative probability. <strong>Force</strong> guarantees that item wins — only one at a time.</div><button class="add-row-btn"'+(state.reroll.items.length>=16?' disabled':'')+' onclick="addReroll()">+ Add item</button><button class="done-btn" onclick="closeDrawer()">Done</button>';
}
function toggleForce(i){const items=state.reroll.items,was=items[i].forced;items.forEach(d=>d.forced=false);if(!was)items[i].forced=true;renderRerollDrawer();}
function addShame(){if(state.shame.slices.length>=16)return;state.shame.slices.push({name:'',img:null,imgSrc:null,color:PALETTE[state.shame.slices.length%PALETTE.length]});renderShameDrawer();drawWheel();document.getElementById('drawerBody').querySelectorAll('.row-input')[state.shame.slices.length-1].focus();}
function removeShame(i){if(state.shame.slices.length<=2)return;state.shame.slices.splice(i,1);renderShameDrawer();drawWheel();}
function addReroll(){if(state.reroll.items.length>=16)return;state.reroll.items.push({name:'',weight:1,forced:false,color:PALETTE[state.reroll.items.length%PALETTE.length]});renderRerollDrawer();drawWheel();}
function removeReroll(i){if(state.reroll.items.length<=2)return;state.reroll.items.splice(i,1);renderRerollDrawer();drawWheel();}
function uploadPhoto(i){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=ev=>{
      const img=new Image();
      img.onload=()=>openCrop(i,img);
      img.src=ev.target.result;
    };
    rd.readAsDataURL(f);
  };
  inp.click();
}

// ── Crop ─────────────────────────────────────────────────
const CS=400,CR=180; // canvas size, circle radius (20px padding each side)
const cropCanvas=document.getElementById('cropCanvas');
const cctx=cropCanvas.getContext('2d');
const crop={img:null,sliceIdx:-1,x:0,y:0,scale:1,minScale:1,dragging:false,lastX:0,lastY:0,pinchDist:0};

function openCrop(idx,img){
  crop.img=img;crop.sliceIdx=idx;
  // initial scale: fill the circle with the shorter dimension
  crop.minScale=(CR*2)/Math.min(img.width,img.height);
  crop.scale=crop.minScale;crop.x=0;crop.y=0;
  const sl=document.getElementById('zoomSlider');
  sl.min=crop.minScale;sl.max=crop.minScale*4;sl.step=crop.minScale*.005;sl.value=crop.scale;
  drawCropCanvas();
  document.getElementById('cropOverlay').classList.add('open');
}
function drawCropCanvas(){
  cropCanvas.width=CS;cropCanvas.height=CS;
  cctx.clearRect(0,0,CS,CS);
  cctx.fillStyle='#111';cctx.fillRect(0,0,CS,CS);
  const iw=crop.img.width*crop.scale,ih=crop.img.height*crop.scale;
  cctx.drawImage(crop.img,CS/2-iw/2+crop.x,CS/2-ih/2+crop.y,iw,ih);
  // dim outside crop circle
  cctx.save();
  cctx.fillStyle='rgba(0,0,0,0.55)';cctx.fillRect(0,0,CS,CS);
  cctx.globalCompositeOperation='destination-out';
  cctx.beginPath();cctx.arc(CS/2,CS/2,CR,0,Math.PI*2);cctx.fill();
  cctx.restore();
  // guide ring + crosshairs
  cctx.beginPath();cctx.arc(CS/2,CS/2,CR,0,Math.PI*2);
  cctx.strokeStyle='rgba(255,255,255,0.75)';cctx.lineWidth=2;cctx.stroke();
  cctx.strokeStyle='rgba(255,255,255,0.15)';cctx.lineWidth=1;
  cctx.beginPath();cctx.moveTo(CS/2,CS/2-CR);cctx.lineTo(CS/2,CS/2+CR);cctx.stroke();
  cctx.beginPath();cctx.moveTo(CS/2-CR,CS/2);cctx.lineTo(CS/2+CR,CS/2);cctx.stroke();
}
function clampCrop(){
  const hw=crop.img.width*crop.scale/2,hh=crop.img.height*crop.scale/2;
  crop.x=Math.max(-(hw-CR),Math.min(hw-CR,crop.x));
  crop.y=Math.max(-(hh-CR),Math.min(hh-CR,crop.y));
}
function onCropZoom(v){crop.scale=+v;clampCrop();drawCropCanvas();}

function confirmCrop(){
  // Store crop params relative to image natural size
  const s=state.shame.slices[crop.sliceIdx];
  s.img=crop.img;
  s.imgSrc=crop.img.src;
  // convert canvas-space offset back to image pixels
  s.cropScale=crop.scale;
  s.cropX=crop.x; // canvas-center-relative, scaled pixels
  s.cropY=crop.y;
  renderShameDrawer();drawWheel();
  document.getElementById('cropOverlay').classList.remove('open');
}
function cancelCrop(){document.getElementById('cropOverlay').classList.remove('open');}

// Drag — mouse
const cw=document.getElementById('cropWrap');
cw.addEventListener('mousedown',e=>{crop.dragging=true;crop.lastX=e.clientX;crop.lastY=e.clientY;e.preventDefault();});
window.addEventListener('mousemove',e=>{
  if(!crop.dragging)return;
  crop.x+=e.clientX-crop.lastX;crop.y+=e.clientY-crop.lastY;
  crop.lastX=e.clientX;crop.lastY=e.clientY;
  clampCrop();drawCropCanvas();
});
window.addEventListener('mouseup',()=>{crop.dragging=false;});
// Scroll to zoom
cw.addEventListener('wheel',e=>{
  const sl=document.getElementById('zoomSlider');
  crop.scale=Math.max(+sl.min,Math.min(+sl.max,crop.scale*(e.deltaY<0?1.08:.926)));
  sl.value=crop.scale;clampCrop();drawCropCanvas();e.preventDefault();
},{passive:false});
// Touch
cw.addEventListener('touchstart',e=>{
  if(e.touches.length===1){crop.dragging=true;crop.lastX=e.touches[0].clientX;crop.lastY=e.touches[0].clientY;}
  else if(e.touches.length===2){crop.dragging=false;crop.pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  e.preventDefault();
},{passive:false});
cw.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&crop.dragging){
    crop.x+=e.touches[0].clientX-crop.lastX;crop.y+=e.touches[0].clientY-crop.lastY;
    crop.lastX=e.touches[0].clientX;crop.lastY=e.touches[0].clientY;
    clampCrop();drawCropCanvas();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const sl=document.getElementById('zoomSlider');
    crop.scale=Math.max(+sl.min,Math.min(+sl.max,crop.scale*(d/crop.pinchDist)));
    sl.value=crop.scale;crop.pinchDist=d;clampCrop();drawCropCanvas();
  }
  e.preventDefault();
},{passive:false});
cw.addEventListener('touchend',()=>{crop.dragging=false;});

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// ── Confetti — spectacular ──────────────────────────────
let confBits=[],confRunning=false,confFrame2=null;
const EMOJIS=['🎉','🎊','🏆','⭐','✨','💥','🔥'];

function launchConfetti(accent){
  const cc=document.getElementById('confetti-canvas');
  cc.width=window.innerWidth;cc.height=window.innerHeight;
  const cctx=cc.getContext('2d');
  const cols=[accent,'#005DAA','#003058','#4D8CC4','#A0C2E0','#ffffff','#C0392B'];
  // Burst from center + top fountain
  confBits=Array.from({length:180},(_,i)=>{
    const burst=i<80;
    const angle=burst?(Math.random()*Math.PI*2):(Math.random()*Math.PI-.5);
    const speed=burst?(4+Math.random()*8):(3+Math.random()*6);
    return{
      x:burst?(cc.width/2):(Math.random()*cc.width),
      y:burst?(cc.height/2):(-20-Math.random()*100),
      vx:burst?(Math.cos(angle)*speed):((Math.random()-.5)*4),
      vy:burst?(Math.sin(angle)*speed):(1+Math.random()*4),
      w:6+Math.random()*8,h:10+Math.random()*10,
      color:cols[Math.floor(Math.random()*cols.length)],
      angle:Math.random()*Math.PI*2,va:(Math.random()-.5)*.2,
      alpha:1,isEmoji:Math.random()<.12,
      emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
      size:16+Math.random()*14
    };
  });
  confRunning=true;
  (function tick(){
    cctx.clearRect(0,0,cc.width,cc.height);
    confBits.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.vx*=.99;p.angle+=p.va;
      if(p.y>cc.height-60)p.alpha=Math.max(0,p.alpha-.035);
      cctx.save();cctx.globalAlpha=p.alpha;
      if(p.isEmoji){
        cctx.font=p.size+'px serif';cctx.textAlign='center';cctx.textBaseline='middle';
        cctx.translate(p.x,p.y);cctx.rotate(p.angle);
        cctx.fillText(p.emoji,0,0);
      }else{
        cctx.translate(p.x,p.y);cctx.rotate(p.angle);
        cctx.fillStyle=p.color;cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      }
      cctx.restore();
    });
    confBits=confBits.filter(p=>p.alpha>0);
    if(confBits.length&&confRunning)confFrame2=requestAnimationFrame(tick);
  })();
}
function stopConfetti(){
  confRunning=false;if(confFrame2)cancelAnimationFrame(confFrame2);
  document.getElementById('confetti-canvas').getContext('2d').clearRect(0,0,window.innerWidth,window.innerHeight);
}

requestAnimationFrame(()=>requestAnimationFrame(sizeCanvas));
